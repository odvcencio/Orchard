name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (go test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
          cache: true

      - name: Test backend
        run: go test ./...

  backend-vulncheck:
    name: Backend (govulncheck)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          GOVULNCHECK_BIN="$(go env GOPATH)/bin/govulncheck"
          "$GOVULNCHECK_BIN" ./...

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  postgres-integration:
    name: Postgres integration (migrate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orchard
          POSTGRES_PASSWORD: orchard
          POSTGRES_DB: orchard_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orchard -d orchard_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ORCHARD_DB_DRIVER: postgres
      ORCHARD_DB_DSN: postgres://orchard:orchard@localhost:5432/orchard_ci?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
          cache: true

      - name: Run Postgres migration smoke test
        run: |
          go run ./cmd/orchard migrate
          go run ./cmd/orchard migrate
